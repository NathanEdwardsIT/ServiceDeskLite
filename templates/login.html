<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Help Desk</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page">
  <div class="login-card">
    <h1>Help Desk Ticketing</h1>
    <p class="subtitle">Active Directory Simulation Login</p>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <label>Username / SAM / UPN</label>
      <input type="text" name="username" required placeholder="jsmith or jsmith@corp.local">
      <label>Password</label>
      <input type="password" name="password" required placeholder="password">
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>
    <div class="demo-accounts">
      <h3>Demo Accounts</h3>
      <ul>
        <li><strong>admin</strong> / password — Full access</li>
        <li><strong>tech1</strong> / password — Technician</li>
        <li><strong>lead1</strong> / password — Team lead + dashboard</li>
        <li><strong>user1</strong> / password — End user</li>
      </ul>
    </div>
  </div>
</body>
</html>
